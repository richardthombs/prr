name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to validate and package (for dry runs)"
        required: true
        type: string

jobs:
  validate-tag:
    name: Validate release tag contract
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate SemVer tag format
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.release_tag }}"

          # Contract: stable vMAJOR.MINOR.PATCH, pre-release vMAJOR.MINOR.PATCH-rc.N
          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$ ]]; then
            echo "ERROR: invalid release tag '$tag'"
            echo "Expected one of:"
            echo "  - vMAJOR.MINOR.PATCH (stable)"
            echo "  - vMAJOR.MINOR.PATCH-rc.N (pre-release candidate)"
            echo "Examples: v1.2.3, v2.0.0-rc.1"
            exit 1
          fi

          if [[ "$tag" == *"+"* ]]; then
            echo "ERROR: build metadata (+...) is not permitted in release tags for this repository"
            exit 1
          fi

          echo "Release tag is valid: $tag"

  build-artifacts:
    name: Build release artifacts
    runs-on: ${{ matrix.runner }}
    needs: validate-tag
    if: ${{ needs.validate-tag.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - index: 1
            os: darwin
            arch: arm64
            ext: ""
            runner: macos-14
          - index: 2
            os: linux
            arch: amd64
            ext: ""
            runner: ubuntu-latest
          - index: 3
            os: linux
            arch: arm64
            ext: ""
            runner: ubuntu-24.04-arm
          - index: 4
            os: windows
            arch: amd64
            ext: ".exe"
            runner: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build deterministic release binary
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.validate-tag.outputs.release_tag }}"
          commit="${{ github.sha }}"
          build_date="$(TZ=UTC git show -s --date=format-local:'%Y-%m-%dT%H:%M:%SZ' --format=%cd "$commit")"
          artifact="prr_${version}_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}"

          mkdir -p dist/release

          GOOS="${{ matrix.os }}" GOARCH="${{ matrix.arch }}" CGO_ENABLED=0 \
            go build \
              -trimpath \
              -ldflags "-s -w -buildid= -X main.version=${version} -X main.commit=${commit} -X main.buildDate=${build_date}" \
              -o "dist/release/${artifact}" \
              ./cmd/prr

          built_version="$("dist/release/${artifact}" version)"
          if [[ "$built_version" != "$version" ]]; then
            echo "ERROR: version smoke check failed for ${artifact}"
            echo "Expected: ${version}"
            echo "Actual:   ${built_version}"
            exit 1
          fi

          echo "Built and verified: ${artifact}"

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.index }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/release/*
          if-no-files-found: error

  verify-artifact-contract:
    name: Verify artifact contract before publish
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-artifacts
    if: ${{ needs.validate-tag.result == 'success' && needs.build-artifacts.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Validate deterministic artifact matrix and naming
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.validate-tag.outputs.release_tag }}"

          bash scripts/verify_release_contract.sh "$version" dist/release

  publish-release:
    name: Publish GitHub release artifacts
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-artifacts
      - verify-artifact-contract
    if: ${{ needs.validate-tag.result == 'success' && needs.build-artifacts.result == 'success' && needs.verify-artifact-contract.result == 'success' }}
    steps:
      - name: Publication contract gate
        run: |
          echo "Publish stage intentionally deferred to Story 2.3."
          echo "This job only runs when tag validation, build, and artifact contract checks succeed."
